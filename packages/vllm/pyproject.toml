[project]
name = "flm-vllm"
version = "0.1.0"
description = "vLLM export and rollout helpers for FLM checkpoints."
requires-python = ">=3.12"
dependencies = [
  "flm-datasets",
  "flm-llm",
  "flm-train",
  "safetensors>=0.5",
  "torch>=2.5",
]

[project.scripts]
flm-vllm-export = "flm_vllm.cli:export_main"
flm-vllm-import = "flm_vllm.cli:import_main"
flm-vllm-rollout = "flm_vllm.cli:rollout_main"

[tool.uv.sources]
flm-datasets = { workspace = true }
flm-llm = { workspace = true }
flm-train = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
