[project]
name = "flm-datasets"
version = "0.1.0"
description = "Dataset loading and preprocessing package."
requires-python = ">=3.12"
dependencies = [
  "tiktoken>=0.8.0",
  "tokenizers>=0.22.0",
  "torch>=2.5",
  "uni-tokenizer",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
