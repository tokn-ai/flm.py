[project]
name = "flm-modules"
version = "0.1.0"
description = "Reusable neural network building blocks."
requires-python = ">=3.12"
dependencies = [
  "torch>=2.5",
  "jaxtyping",
  "einops",
]

[project.optional-dependencies]
nvidia = [
  "apache-tvm-ffi<0.1.12",
  "tilelang>=0.1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
