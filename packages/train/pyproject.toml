[project]
name = "flm-train"
version = "0.1.0"
description = "Training workflows package."
requires-python = ">=3.12"
dependencies = [
  "flm-datasets",
  "flm-llm",
]

[tool.uv.sources]
flm-datasets = { workspace = true }
flm-llm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
