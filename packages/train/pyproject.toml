[project]
name = "flm-train"
version = "0.1.0"
description = "Training workflows package."
requires-python = ">=3.12"
dependencies = [
  "datasets>=3.0",
  "flm-datasets",
  "flm-llm",
  "flm-modules",
  "numpy>=2.0",
  "pyyaml>=6.0",
  "torch>=2.5",
]

[project.optional-dependencies]
mlflow = ["mlflow>=2.0"]
tensorboard = ["tensorboard>=2.0"]
wandb = ["wandb>=0.17"]

[tool.uv.sources]
flm-datasets = { workspace = true }
flm-llm = { workspace = true }
flm-modules = { workspace = true }

[project.scripts]
flm-data = "flm_train.data_cli:main"
flm-train-experiment = "flm_train.cli:main"
flm-train-tune = "flm_train.tune:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
