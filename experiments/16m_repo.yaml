name: 16m_repo_reference
seed: 42
device: cuda

data:
  kind: repo_sources
  repo_root: .
  encoding_name: cl100k_base
  seq_len: 512

model:
  name: reference
  d_model: 128
  n_layers: 12
  n_heads: 2
  d_ff: 512

optimizer:
  name: adamw
  learning_rate: 3.0e-4
  weight_decay: 0.1

train:
  batch_size: 8
  steps: 1000

output:
  run_dir: runs/16m_repo_reference

sinks:
  - kind: files
