name: 16m_repo_reference

data:
  kind: token_dataset
  dataset_root: .cache/data/repo_sources
  version: latest
  encoding_name: cl100k_base
  seq_len: 512

model:
  kind: reference
  d_model: 128
  n_layers: 12
  n_heads: 2
  d_ff: 512

optimizer:
  kind: adamw
  learning_rate: 3.0e-4
  weight_decay: 0.1

loop:
  seed: 42
  device: cuda
  batch_size: 8
  steps: 1000

secrets:
  env_file: .secret

output:
  run_dir: runs/16m_repo_reference

sinks:
  - kind: files
  - kind: tensorboard
